<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f8fafd; margin: 0; }
        .container { max-width: 800px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(52,152,219,0.08); padding: 2rem; }
        .product-title { font-size: 2rem; color: #2c3e50; font-weight: 600; margin-bottom: 0.5rem; }
        .product-price { color: #27ae60; font-size: 1.3rem; font-weight: 600; margin-bottom: 1rem; }
        .product-desc { color: #34495e; margin-bottom: 1.5rem; }
        .product-meta { color: #7f8c8d; margin-bottom: 1.5rem; }
        .rating-stars { font-size: 1.5rem; color: #f1c40f; }
        .review-section { margin-top: 2.5rem; }
        .review-list { margin-top: 1.5rem; }
        .review-item { background: #f8fafd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .review-author { font-weight: 600; color: #2980b9; }
        .review-rating { color: #f1c40f; font-size: 1.1rem; }
        .review-text { margin-top: 0.5rem; color: #34495e; }
        .review-form { margin-top: 2rem; background: #f4f8fb; border-radius: 10px; padding: 1.2rem; }
        .review-form label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .review-form textarea { width: 100%; min-height: 60px; border-radius: 6px; border: 1.5px solid #ddd; padding: 0.7rem; font-size: 1rem; }
        .review-form .star-input { font-size: 1.3rem; color: #f1c40f; cursor: pointer; }
        .review-form button { margin-top: 1rem; background: #3498db; color: #fff; border: none; padding: 0.7rem 2rem; border-radius: 25px; font-weight: 600; font-size: 1rem; cursor: pointer; }
        .review-form button:disabled { background: #ccc; cursor: not-allowed; }
        .login-msg { color: #e74c3c; font-weight: 600; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="display:inline-block;margin-bottom:1rem;color:#3498db;text-decoration:none;font-weight:500;">← Back to Store</a>
        <div class="product-detail">
            <div class="product-image-container">
                <img id="productImage" src="" alt="Product Image" class="product-image">
            </div>
            <div class="product-info">
                <h1 id="productName" class="product-title"></h1>
                <div id="productPrice" class="product-price"></div>
                <div id="productDescription" class="product-description"></div>
                <div id="productStock" class="product-stock"></div>
                <div id="productSubcategory" class="product-subcategory"></div>
                <div id="productDiscount" class="product-discount"></div>
                <div class="product-actions" style="margin-top:1.5rem;display:flex;gap:1rem;">
                    <button id="addToCartBtn" class="btn" style="background:#27ae60;color:#fff;padding:0.7rem 1.5rem;border:none;border-radius:25px;font-weight:600;cursor:pointer;">Add to Cart</button>
                    <button id="addToWishlistBtn" class="btn" style="background:#e67e22;color:#fff;padding:0.7rem 1.5rem;border:none;border-radius:25px;font-weight:600;cursor:pointer;">Add to Wishlist</button>
                </div>
            </div>
        </div>
        <div class="reviews-section">
            <h2>Customer Reviews</h2>
            <div id="reviewList"></div>
            <div id="reviewFormContainer"></div>
        </div>
    </div>
    <script>
    // Place this at the top of your main JS or inside a <script> tag before rendering product details
    const productImages = {
      1: "https://images.unsplash.com/photo-1608256246200-53e635b5b65f?q=80&w=800",
      2: "https://images.unsplash.com/photo-1715539133733-e2a654bfc0c6?q=80&w=800",
      3: "https://images.unsplash.com/photo-1672865451494-81c38f3aec13?w=800&q=80",
      4: "https://images.unsplash.com/photo-1598033129183-c4f50c736f10?q=80&w=800",
      5: "https://images.unsplash.com/photo-1700223255805-df7b526603bf?w=800&q=80"
    };
    // Helper to get query param
    function getQueryParam(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name);
    }
    const productId = getQueryParam('id');
    if (!productId) {
        document.getElementById('productDetails').innerHTML = '<p>Product not found.</p>';
        document.getElementById('reviewFormContainer').innerHTML = '';
    } else {
        fetchProduct();
        fetchReviews();
        renderReviewForm();
    }
    async function fetchProduct() {
        const res = await fetch(`http://localhost:5001/product?id=${productId}`);
        if (!res.ok) {
            document.getElementById('productName').textContent = 'Product not found.';
            return;
        }
        const product = await res.json();
        document.getElementById('productName').textContent = product.Name;
        document.getElementById('productPrice').textContent = `$${product.Price.toFixed(2)}`;
        document.getElementById('productDescription').textContent = product.Description;
        document.getElementById('productStock').textContent = `Stock: ${product.Stock}`;
        document.getElementById('productSubcategory').textContent = `Subcategory: ${product.SubCategoryID}`;
        document.getElementById('productDiscount').textContent = product.Discount ? `Discount: ${product.Discount}%` : '';
        const img = document.getElementById('productImage');
        img.src = productImages[product.ProductID] || product.image || `https://picsum.photos/seed/${product.ProductID}/400/300`;
        img.alt = product.Name;
        if (product.ProductID == 5) {
            img.style.objectFit = 'contain';
            img.style.background = '#fff';
            img.style.height = '300px';
        } else {
            img.style.objectFit = 'cover';
            img.style.height = '200px';
        }
        // Add to Cart
        document.getElementById('addToCartBtn').onclick = async function() {
            const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!user || !user.token) {
                alert('Please log in to add to cart.');
                return;
            }
            try {
                const res = await fetch('http://localhost:5001/cart/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${user.token}`
                    },
                    body: JSON.stringify({ productId: product.ProductID, quantity: 1 })
                });
                const data = await res.json();
                if (res.ok) {
                    this.textContent = 'Added to Cart!';
                    setTimeout(() => { this.textContent = 'Add to Cart'; }, 1200);
                } else {
                    // alert(data.error || 'Could not add to cart');
                }
            } catch (err) {
                alert('Server error');
            }
        };
        // Add to Wishlist
        document.getElementById('addToWishlistBtn').onclick = async function() {
            const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!user || !user.token) {
                alert('Please log in to add to wishlist.');
                return;
            }
            try {
                const res = await fetch('http://localhost:5001/wishlist/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${user.token}`
                    },
                    body: JSON.stringify({ productId: product.ProductID })
                });
                const data = await res.json();
                if (res.ok) {
                    this.textContent = 'Added to Wishlist!';
                    setTimeout(() => { this.textContent = 'Add to Wishlist'; }, 1200);
                } else {
                    alert(data.error || 'Could not add to wishlist');
                }
            } catch (err) {
                alert('Server error');
            }
        };
    }
    async function fetchReviews() {
        const res = await fetch(`http://localhost:5001/reviews?productId=${productId}`);
        const reviews = res.ok ? await res.json() : [];
        const reviewList = document.getElementById('reviewList');
        if (!reviews.length) {
            reviewList.innerHTML = '<p>No reviews yet.</p>';
            return;
        }
        reviewList.innerHTML = reviews.map(r => `
            <div class="review-item">
                <div class="review-author">${r.CustomerName || 'Anonymous'} <span class="review-rating">${'★'.repeat(r.Rating)}${'☆'.repeat(5 - r.Rating)}</span></div>
                <div class="review-text">${r.Review}</div>
                ${r.Date ? `<div style='color:#888;font-size:0.95em;margin-top:0.3em;'>${r.Date}</div>` : ''}
            </div>
        `).join('');
    }
    function renderReviewForm() {
        const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
        const container = document.getElementById('reviewFormContainer');
        if (!user) {
            container.innerHTML = '<div class="login-msg">Please log in to leave a review.</div>';
            return;
        }
        container.innerHTML = `
            <form id="reviewForm" class="review-form">
                <label>Rating:
                    <span id="starInputs">
                        ${[1,2,3,4,5].map(i => `<span class="star-input" data-value="${i}">★</span>`).join('')}
                    </span>
                </label>
                <label>Review:
                    <textarea id="reviewText" required></textarea>
                </label>
                <button type="submit">Submit Review</button>
            </form>
        `
    }
    </script>
</body>
</html>
