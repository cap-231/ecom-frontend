<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product (Simple)</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 400px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 10px #0001; padding: 2rem; }
        h2 { text-align: center; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.3rem; }
        input, select, textarea { width: 100%; padding: 0.6rem; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #27ae60; color: #fff; border: none; padding: 0.7rem 1.5rem; border-radius: 25px; cursor: pointer; width: 100%; }
        .msg { margin: 1rem 0; text-align: center; }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add Product</h2>
        <div id="msg" class="msg"></div>
        <form id="addProductForm">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" required>
            </div>
            <div class="form-group">
                <label>Price</label>
                <input type="number" id="productPrice" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="productCategory" required>
                    <option value="">Loading...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="productDescription" required></textarea>
            </div>
            <button type="submit">Add Product</button>
        </form>
    </div>
    <script type="module">
        import { setupProductForm } from './productLogic.js';
        setupProductForm();
    </script>
</body>
</html>
